services:
  rtmp-server:
    image: tiangolo/nginx-rtmp:latest
    container_name: livestream-rtmp
    ports:
      - "1935:1935" # RTMP Stream ingest
      - "8081:8080" # HLS Player & Web App
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/www:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:8080/ || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # verse-rotator:
  #   image: bash:5
  #   container_name: verse_rotator
  #   restart: always
  #   volumes:
  #     - ./config:/config
  #   command: ["bash", "/config/verse_rotator.sh"]

  ffmpeg-streamer:
    image: linuxserver/ffmpeg:latest
    container_name: livestream-ffmpeg
    restart: unless-stopped
    depends_on:
      rtmp-server:
        condition: service_healthy
    volumes:
      - ./images:/images:ro
      - ./fonts:/fonts:ro
      - ./videos:/videos:ro
      - ./logs:/logs
    environment:
      - STREAM_KEY=fzcp-swfh-z7zr-w4zm-6p2f
      - LOCAL_RTMP=rtmp://rtmp-server/live/test
    cpus: '2.0'
    mem_limit: 1g
    entrypoint: >
      ffmpeg
        -stream_loop -1
        -i "/videos/sri chakra.mp4"
        -f lavfi
        -i anullsrc=r=44100:cl=stereo
        -c:v libx264
        -preset ultrafast
        -profile:v main
        -b:v 2000k
        -minrate 2000k
        -maxrate 2000k
        -bufsize 2000k
        -pix_fmt yuv420p
        -r 15
        -g 30
        -keyint_min 30
        -sc_threshold 0
        -threads 0
        -vf "scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black"
        -c:a aac
        -b:a 128k
        -ar 44100
        -map 0:v
        -map 1:a
        -f tee
        "[f=flv]rtmp://rtmp-server/live/test|[f=flv:onfail=ignore]rtmp://b.rtmp.youtube.com/live2/fzcp-swfh-z7zr-w4zm-6p2f"




