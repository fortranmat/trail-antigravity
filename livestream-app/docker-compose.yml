services:
  rtmp-server:
    image: tiangolo/nginx-rtmp:latest
    container_name: livestream-rtmp
    ports:
      - "1935:1935" # RTMP Stream ingest
      - "8081:8080" # HLS Player & Web App
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/www:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:8080/ || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5

  ffmpeg-streamer:
    image: linuxserver/ffmpeg:latest
    container_name: livestream-ffmpeg
    env_file:
      - .env
    depends_on:
      rtmp-server:
        condition: service_healthy
    volumes:
      - ./images:/images:ro
      - ./audio:/audio:ro
    restart: unless-stopped
    # Use standard FFmpeg flags for looping an image and audio to multiple RTMP endpoints
    # This pushes to BOTH the local mockup player and YouTube Live
    command: >
      -re -loop 1 -framerate $FRAMERATE -i /images/$IMAGE_FILE 
      -c:v libx264 -preset veryfast -b:v $VIDEO_BITRATE -maxrate $VIDEO_BITRATE -bufsize 6000k -pix_fmt yuv420p -g 60 
      -f flv rtmp://rtmp-server/live/$STREAM_NAME
      -f hls -method POST -hls_time 1 -hls_list_size 3 -hls_segment_type mpegts $YOUTUBE_URL
