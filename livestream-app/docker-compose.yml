services:
  rtmp-server:
    image: tiangolo/nginx-rtmp:latest
    container_name: livestream-rtmp
    ports:
      - "1935:1935" # RTMP Stream ingest
      - "8081:8080" # HLS Player & Web App
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/www:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:8080/ || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5

  ffmpeg-streamer:
    image: linuxserver/ffmpeg:latest
    container_name: livestream-ffmpeg
    restart: unless-stopped
    depends_on:
      rtmp-server:
        condition: service_healthy
    volumes:
      - ./images:/images:ro
    command:
      - "-re"
      - "-loop"
      - "1"
      - "-framerate"
      - "30"
      - "-i"
      - "/images/background.png"
      - "-f"
      - "lavfi"
      - "-i"
      - "anullsrc=r=44100:cl=stereo"
      - "-c:v"
      - "libx264"
      - "-preset"
      - "veryfast"
      - "-tune"
      - "stillimage"
      - "-profile:v"
      - "main"
      - "-b:v"
      - "3000k"
      - "-minrate"
      - "3000k"
      - "-maxrate"
      - "3000k"
      - "-bufsize"
      - "3000k"
      - "-pix_fmt"
      - "yuv420p"
      - "-g"
      - "60"
      - "-keyint_min"
      - "60"
      - "-sc_threshold"
      - "0"
      - "-r"
      - "30"
      - "-c:a"
      - "aac"
      - "-b:a"
      - "128k"
      - "-ar"
      - "44100"
      - "-map"
      - "0:v"
      - "-map"
      - "1:a"
      - "-f"
      - "tee"
      - "[f=flv]rtmp://rtmp-server/live/test|[f=flv:onfail=ignore]rtmp://a.rtmp.youtube.com/live2/fzcp-swfh-z7zr-w4zm-6p2f"




