services:
  rtmp-server:
    image: tiangolo/nginx-rtmp:latest
    container_name: livestream-rtmp
    ports:
      - "1935:1935" # RTMP Stream ingest
      - "8081:8080" # HLS Player & Web App
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/www:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:8080/ || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5

  ffmpeg-streamer:
    image: linuxserver/ffmpeg:latest
    container_name: livestream-ffmpeg
    restart: unless-stopped
    depends_on:
      rtmp-server:
        condition: service_healthy
    volumes:
      - ./images:/images:ro
    command:
      - "-re"
      - "-loop"
      - "1"
      - "-framerate"
      - "30"
      - "-i"
      - "/images/background.png"
      - "-c:v"
      - "libx264"
      - "-preset"
      - "veryfast"
      - "-b:v"
      - "3000k"
      - "-maxrate"
      - "3000k"
      - "-bufsize"
      - "6000k"
      - "-pix_fmt"
      - "yuv420p"
      - "-g"
      - "60"
      - "-f"
      - "flv"
      - "rtmp://rtmp-server/live/test"
      - "-f"
      - "flv"
      - "rtmp://a.rtmp.youtube.com/live2/g59r-dzxm-hsja-vc9t-7v7d"
