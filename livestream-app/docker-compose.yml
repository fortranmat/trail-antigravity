services:
  rtmp-server:
    image: tiangolo/nginx-rtmp:latest
    container_name: livestream-rtmp
    ports:
      - "1935:1935" # RTMP Stream ingest
      - "8081:8080" # HLS Player & Web App
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/www:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:8080/ || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # verse-rotator:
  #   image: bash:5
  #   container_name: verse_rotator
  #   restart: always
  #   volumes:
  #     - ./config:/config
  #   command: ["bash", "/config/verse_rotator.sh"]

  ffmpeg-streamer:
    image: linuxserver/ffmpeg:latest
    container_name: livestream-ffmpeg
    restart: unless-stopped
    depends_on:
      rtmp-server:
        condition: service_healthy
    volumes:
      - ./images:/images:ro
      - ./fonts:/fonts:ro
      - ./logs:/logs
    environment:
      - STREAM_KEY=fzcp-swfh-z7zr-w4zm-6p2f
      - LOCAL_RTMP=rtmp://rtmp-server/live/test
    cpus: '2.0'
    mem_limit: 1g
    entrypoint: >
      ffmpeg
        -re
        -loop 1
        -framerate 15
        -i /images/background.png
        -f lavfi
        -i anullsrc=r=44100:cl=stereo
        -c:v libx264
        -preset ultrafast
        -tune stillimage
        -profile:v main
        -b:v 2000k
        -minrate 2000k
        -maxrate 2000k
        -bufsize 2000k
        -pix_fmt yuv420p
        -r 15
        -g 30
        -keyint_min 30
        -sc_threshold 0
        -threads 0
        -vf "pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,
             drawtext=text='ஸ்ரீ சக்கரம்':fontfile=/fonts/NotoSansTamil-Regular.ttf:fontsize=44:fontcolor=gold:shadowcolor=black:shadowx=3:shadowy=3:x=(w-text_w)/2:y=30,
             drawtext=text='Sri Chakram':fontfile=/fonts/NotoSans-Regular.ttf:fontsize=32:fontcolor=gold:shadowcolor=black:shadowx=2:shadowy=2:x=(w-text_w)/2:y=85,
             drawtext=text='ஐம் ஹ்ரீம் ஸ்ரீம் | க்லீம் | ஹ்ரீம் | ஸ்ரீம் | க ஏ ஈ ல ஹ்ரீம் | ஹ்ஸ்ரைம் | ஹ்ரீம் க்லீம் ஐம்':fontfile=/fonts/NotoSansTamil-Regular.ttf:fontsize=36:fontcolor=gold:shadowcolor=black:shadowx=2:shadowy=2:x=(w-text_w)/2:y=h-120,
             drawtext=text='Aim Hrim Srim | Klim | Hrim | Srim | Ka E I La Hrim | Hsraim | Hrim Klim Aim':fontfile=/fonts/NotoSans-Regular.ttf:fontsize=28:fontcolor=white:shadowcolor=black:shadowx=2:shadowy=2:x=(w-text_w)/2:y=h-65"
        -c:a aac
        -b:a 128k
        -ar 44100
        -map 0:v
        -map 1:a
        -f tee
        "[f=flv]rtmp://rtmp-server/live/test|[f=flv:onfail=ignore]rtmp://b.rtmp.youtube.com/live2/fzcp-swfh-z7zr-w4zm-6p2f"




